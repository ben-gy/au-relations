name: Data Pipeline

on:
  schedule:
    # Source cadence: the Australian Treaties Database publishes new treaty
    # actions irregularly (roughly monthly at the fastest); the DFAT missions
    # page and FTA list change a few times a year. Quarterly refresh is
    # proportional. Staggered: day 9, 06:23 UTC.
    - cron: '23 6 9 1,4,7,10 *'
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['pipeline/**']

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node pipeline/collect.mjs
      - run: node pipeline/aggregate.mjs
      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --cached --quiet || git commit -m "Update data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push || (git pull --rebase && git push)
